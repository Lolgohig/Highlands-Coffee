<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Orders</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="../src/assets/styles/orders.css"
  >
</head>
<body>

  <nav class="admin-navbar">
    <div class="nav-left">
      <h2>Highlands Admin</h2>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="admin-inventory.html">Inventory</a>
      <a href="admin-categories.html">Categories</a>
      <a href="admin-orders.html" class="active">Orders</a>
      <a href="admin-reports.html">Reports</a>
      <a href="admin-campaigns.html">Campaigns</a>
      <a href="admin-news.html">News</a>
      <a href="admin-staff.html">Staff</a>
    </div>

    <div class="nav-right">
      <div class="profile-dropdown">
        <img
          id="navbarAvatar"
          class="avatar"
          src="https://i.pravatar.cc/100"
          alt="avatar"
        >
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="profile.html">Profile</a>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="orders-container">
    <div class="orders-card">
      <div class="header">
        <h1>Quản lý đơn hàng</h1>
      </div>

      <table>
        <thead>
          <tr>
            <th>Mã đơn</th>
            <th>Khách hàng</th>
            <th>SĐT</th>
            <th>Địa chỉ giao hàng</th>
            <th>Chi tiết món đặt</th> 
            <th>Tổng tiền (+Ship)</th>
            <th>Trạng thái</th>
            <th>Ngày tạo</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="orders-list">
        </tbody>
      </table>
    </div>
  </main>

  <script
    type="module"
    src="../src/modules/admin/orders/orders.js"
  ></script>
  <script
    type="module"
    src="../src/shared/avatar.js"
  ></script>
</body>
</html>
